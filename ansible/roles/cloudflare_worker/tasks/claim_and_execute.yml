---
# cloudflare_worker — claim_and_execute.yml
# Orchestrates the full lifecycle of a single CloudflareTask:
#   claim → execute → report_result (or report_failure)
#
# Variables (via include_tasks loop):
#   - cfzt_task: The CloudflareTask resource

- name: Set task identity facts
  ansible.builtin.set_fact:
    ct_name: "{{ cfzt_task.metadata.name }}"
    ct_action: "{{ cfzt_task.spec.action | default('reconcile') }}"
    ct_hostname: "{{ cfzt_task.spec.hostname | default('') }}"
    ct_route_name: "{{ cfzt_task.spec.httprouteRef.name | default('') }}"
    ct_route_namespace: "{{ cfzt_task.spec.httprouteRef.namespace | default('') }}"

- name: Claim task — patch status to InProgress
  kubernetes.core.k8s:
    state: patched
    api_version: cfzt.cloudflare.com/v1alpha1
    kind: CloudflareTask
    name: "{{ ct_name }}"
    namespace: "{{ operator_namespace | default('cloudflare-zero-trust') }}"
    definition:
      status:
        phase: InProgress
        message: "Claimed by {{ worker_pod_name }}"
        workerPod: "{{ worker_pod_name }}"
  register: claim_result

- name: Log task claimed
  ansible.builtin.debug:
    msg: "cloudflare_worker: claimed task {{ ct_name }} (action={{ ct_action }}, route={{ ct_route_namespace }}/{{ ct_route_name }})"

# ─── Execute all Cloudflare API operations ────────────────────────────────────

- name: Execute Cloudflare operations for task
  block:
    - name: Execute Cloudflare delete operations
      include_tasks: execute_delete.yml
      when: ct_action == 'delete'

    - name: Execute Cloudflare reconcile operations
      include_tasks: execute_task.yml
      when: ct_action != 'delete'

    - name: Report success
      include_tasks: report_result.yml

  rescue:
    - name: Read service account token for failure status patch
      ansible.builtin.slurp:
        src: /var/run/secrets/kubernetes.io/serviceaccount/token
      register: cf_worker_sa_token_fail
      no_log: true

    - name: Report task failure
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/apis/cfzt.cloudflare.com/v1alpha1/namespaces/{{ operator_namespace | default('cloudflare-zero-trust') }}/cloudflaretasks/{{ ct_name }}/status"
        method: PATCH
        headers:
          Authorization: "Bearer {{ cf_worker_sa_token_fail.content | b64decode }}"
          Content-Type: "application/merge-patch+json"
        body_format: json
        body:
          status:
            phase: Failed
            message: "{{ ansible_failed_result.msg | default('Unknown error during Cloudflare API execution') }}"
            workerPod: "{{ worker_pod_name }}"
        ca_path: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        status_code: [200]
      failed_when: false

    - name: Log task failure
      ansible.builtin.debug:
        msg: >-
          cloudflare_worker: task {{ ct_name }} FAILED —
          {{ ansible_failed_result.msg | default('see CloudflareTask status for details') }}
