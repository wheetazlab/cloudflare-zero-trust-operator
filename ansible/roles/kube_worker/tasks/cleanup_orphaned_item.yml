---
# Process a single orphaned state ConfigMap.
# Called by cleanup_orphaned.yml via include_tasks with loop_var: orphaned_cm
#
# Variables provided by the loop (cleanup_orphaned.yml):
#   - orphaned_cm: the ConfigMap resource object

- name: Set facts for orphaned ConfigMap {{ orphaned_cm.metadata.name }}
  ansible.builtin.set_fact:
    ocm_name: "{{ orphaned_cm.metadata.name }}"
    ocm_cloudflare_ids: "{{ orphaned_cm.data.cloudflare_ids | default('{}') | from_json }}"
    ocm_hostname: "{{ orphaned_cm.data.hostname | default('') }}"
    ocm_tunnel_id: "{{ orphaned_cm.data.tunnel_id | default('') }}"
    ocm_zone_id: "{{ orphaned_cm.data.zone_id | default('') }}"
    ocm_tenant_name: "{{ orphaned_cm.data.tenant_name | default('') }}"
    ocm_httproute_name: "{{ orphaned_cm.data.httproute_name | default('') }}"
    ocm_httproute_namespace: "{{ orphaned_cm.data.httproute_namespace | default('') }}"
    ocm_delete_task_name: "cfzt-delete-{{ orphaned_cm.metadata.name | replace('cfzt-', '', 1) }}"

- name: Resolve tenant for {{ ocm_name }}
  ansible.builtin.set_fact:
    ocm_tenant: "{{ (cfzt_tenants | selectattr('metadata.name', 'equalto', ocm_tenant_name) | list | first) if ocm_tenant_name != '' else none }}"

- name: Warn when tenant not found for {{ ocm_name }}
  ansible.builtin.debug:
    msg: >-
      WARNING: Tenant '{{ ocm_tenant_name }}' not found for orphaned ConfigMap {{ ocm_name }}.
      Cloudflare resources will NOT be removed automatically — delete them manually.
      Removing orphaned ConfigMap anyway.
  when: ocm_tenant is none or ocm_tenant_name == ''

- name: Create delete CloudflareTask for {{ ocm_name }}
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: cfzt.cloudflare.com/v1alpha1
      kind: CloudflareTask
      metadata:
        name: "{{ ocm_delete_task_name }}"
        namespace: "{{ operator_namespace | default('cloudflare-zero-trust') }}"
        labels:
          cfzt.cloudflare.com/tenant: "{{ ocm_tenant_name }}"
          cfzt.cloudflare.com/action: delete
      spec:
        action: delete
        httprouteRef:
          name: "{{ ocm_httproute_name }}"
          namespace: "{{ ocm_httproute_namespace }}"
        tenantRef:
          name: "{{ ocm_tenant_name }}"
          namespace: "{{ ocm_tenant.metadata.namespace }}"
        accountId: "{{ ocm_tenant.spec.accountId }}"
        credentialSecretRef:
          name: "{{ ocm_tenant.spec.credentialRef.name }}"
          namespace: "{{ ocm_tenant.metadata.namespace }}"
          key: "{{ ocm_tenant.spec.credentialRef.key | default('token') }}"
        deleteIds:
          hostname: "{{ ocm_hostname }}"
          accessAppId: "{{ ocm_cloudflare_ids.accessAppId | default('') }}"
          cnameRecordId: "{{ ocm_cloudflare_ids.cnameRecordId | default('') }}"
          serviceTokenId: "{{ ocm_cloudflare_ids.serviceTokenId | default('') }}"
          dnsRecordId: "{{ ocm_cloudflare_ids.dnsRecordId | default('') }}"
          tunnelId: "{{ ocm_tunnel_id }}"
          zoneId: "{{ ocm_zone_id }}"
  when: ocm_tenant is not none and ocm_tenant_name != ''

- name: Delete orphaned state ConfigMap {{ ocm_name }}
  kubernetes.core.k8s:
    api_version: v1
    kind: ConfigMap
    name: "{{ ocm_name }}"
    namespace: "{{ operator_namespace | default('cloudflare-zero-trust') }}"
    state: absent
