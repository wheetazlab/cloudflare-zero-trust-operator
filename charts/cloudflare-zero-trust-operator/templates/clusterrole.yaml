{{- if .Values.rbac.create }}
---
# ClusterRole: full operator permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cloudflare-zero-trust-operator.fullname" . }}
  labels:
    {{- include "cloudflare-zero-trust-operator.labels" . | nindent 4 }}
rules:
  # kopf needs to watch CRDs for resource discovery
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  # CRDs owned by this operator — kopf needs patch to store handler annotations
  - apiGroups: ["cfzt.cloudflare.com"]
    resources:
      - cloudflarezerotrusttenants
      - cloudflarezerotrusttemplates
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["cfzt.cloudflare.com"]
    resources:
      - cloudflarezerotrusttenants/status
      - cloudflarezerotrusttemplates/status
    verbs: ["get", "patch", "update"]
  # Gateway API – watches HTTPRoutes to build tunnel routing
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes/status"]
    verbs: ["get", "patch", "update"]
  # Core resources
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
---
# ClusterRoleBinding: operator ClusterRole → ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cloudflare-zero-trust-operator.fullname" . }}
  labels:
    {{- include "cloudflare-zero-trust-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "cloudflare-zero-trust-operator.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "cloudflare-zero-trust-operator.serviceAccountName" . }}
    namespace: {{ include "cloudflare-zero-trust-operator.namespace" . }}
{{- end }}
